name = "gitzette"
main = "src/index.ts"
compatibility_date = "2024-11-01"
account_id = "a3265e0d0db71fdece29365819452f00"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "gitzette-db"
database_id = "4a3624d7-7de8-46d5-91f5-7ee79856ccaa"

[[r2_buckets]]
